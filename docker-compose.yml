version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: algocode_db
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: algocode_server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://db:27017/algocode
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: algocode_client
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_started
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo-data: